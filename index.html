<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIN — Vending Innovations</title>
<style>
:root{--neg:#0A0A0A;--ora:#E8820C;--ora2:#C46E08;--ora3:#F59C2E;--bla:#FFFFFF;--g1:#1A1A1A;--g2:#242424;--g3:#2E2E2E;--gb:#383838;--gt:#999;--ver:#22C55E;--roj:#EF4444;--azu:#3B82F6;--ama:#F59E0B}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--neg);color:var(--bla);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}
/* LOGIN */
#loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.lbox{width:100%;max-width:370px;padding:2.5rem;background:var(--g1);border:1px solid var(--gb);border-radius:16px;text-align:center}
.lbox img{width:160px;margin:0 auto 2rem;display:block}
.lbox p.sub{font-size:12px;color:var(--gt);margin-bottom:1.5rem;letter-spacing:.08em;text-transform:uppercase}
.lf{margin-bottom:.875rem;text-align:left}
.lf label{font-size:11px;color:var(--gt);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.lf input{width:100%;background:var(--g2);border:1px solid var(--gb);border-radius:8px;padding:10px 13px;color:var(--bla);font-size:14px;outline:none;transition:border-color .15s}
.lf input:focus{border-color:var(--ora)}
.lbtn{width:100%;background:var(--ora);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:.25rem;transition:background .15s}
.lbtn:hover{background:var(--ora2)}
.lerr{color:var(--roj);font-size:12px;margin-top:.75rem;display:none}
.ldemo{font-size:11px;color:var(--gt);margin-top:1.25rem}
.ldemo span{color:var(--ora);cursor:pointer;text-decoration:underline}
/* SHELL */
#app{display:none;min-height:100vh}
/* SIDEBAR */
.sb{position:fixed;top:0;left:0;width:216px;height:100vh;background:var(--g1);border-right:1px solid var(--gb);display:flex;flex-direction:column;z-index:100}
.sb-logo{padding:1.25rem 1.25rem .875rem;border-bottom:1px solid var(--gb)}
.sb-logo img{width:110px}
.sb-user{padding:.625rem 1rem;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--gb)}
.av{width:30px;height:30px;border-radius:50%;background:var(--ora);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.un{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ur{font-size:10px;color:var(--ora);letter-spacing:.05em;text-transform:uppercase}
.sb-nav{flex:1;padding:.875rem .625rem;overflow-y:auto}
.nsec{font-size:10px;color:var(--gt);letter-spacing:.1em;text-transform:uppercase;padding:.375rem .75rem;margin-top:.375rem}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--gt);font-size:13px;transition:all .12s;margin-bottom:1px}
.ni:hover{background:var(--g2);color:var(--bla)}
.ni.on{background:var(--ora);color:#fff}

const SUPA_URL='https://vsbhiffdomrmgfiwlsvo.supabase.co';const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzYmhpZmZkb21ybWdmaXdsc3ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDg5NjEsImV4cCI6MjA5NzEyNDk2MX0.BO-7WcIB7yCh0g5x8Khg-SGTGNyXjKMelb2qstHgMSE';
let ONLINE_MODE=false;let MAQ_ACTIVA=null;

async function sbFetch(path,opt={}){
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':opt.prefer||'return=representation',...(opt.headers||{})},
    method:opt.method||'GET',body:opt.body?JSON.stringify(opt.body):undefined
  });
  if(!res.ok){console.error('Supabase error:',await res.text());return null;}
  const t=await res.text();return t?JSON.parse(t):null;
}
const sbGet=(t,q='')=>sbFetch(t+(q?'?'+q:''));
const sbPost=(t,b)=>sbFetch(t,{method:'POST',body:b});
const sbUpsert=(t,b)=>sbFetch(t,{method:'POST',body:b,prefer:'resolution=merge-duplicates,return=representation'});
const sbPatch=(t,q,b)=>sbFetch(t+'?'+q,{method:'PATCH',body:b});

async function checkOnline(){
  try{
    const r=await sbGet('parametros','clave=eq.iva_pct');
    ONLINE_MODE=!!(r&&r.length);
    if(ONLINE_MODE){
      console.log('✓ Conectado a Supabase');
      const params=await sbGet('parametros');
      if(params)params.forEach(p=>{
        if(p.clave==='iva_pct')PAR.IVA=parseFloat(p.valor);
        if(p.clave==='mp_pct')PAR.MP=parseFloat(p.valor);
        if(p.clave==='alerta_stock_pct')PAR.AL=parseFloat(p.valor);
      });
    }
  }catch(e){ONLINE_MODE=false;}
  return ONLINE_MODE;
}

async function loadMaquinasSupa(){
  if(!ONLINE_MODE||!CU)return;
  try{
    const q=CU.role==='admin'?'activa=eq.true':'usuario_id=eq.'+CU.id+'&activa=eq.true';
    const maquinas=await sbGet('maquinas',q+'&order=nombre');
    if(!maquinas||!maquinas.length)return;
    for(const m of maquinas){
      if(!MAQ[m.codigo]){
        const ci={};P.forEach(p=>{ci[p.rk]={potes:0,precio:p.com*(1-p.d)};}); 
        const stk={};P.forEach(p=>{stk[p.rk]=0;});
        MAQ[m.codigo]={name:m.nombre,code:m.codigo,tipo:m.tipo,ci,stock:stk,meses:[],compras:[],invTotal:0,ivaCredTotal:0,fechaAlta:m.fecha_alta,inactivos:{},supaId:m.id};
      }
      MAQ[m.codigo].supaId=m.id;
      const stockData=await sbGet('stock','maquina_id=eq.'+m.id);

// Recalcular inversión de una máquina a partir de su carga inicial
function recalcCompra(){
  const IVA=PAR.IVA/100;
  let costoTotal=0,ivaTotal=0;
  document.querySelectorAll('#compraEditable input[type=number]').forEach(inp=>{
    const rk=inp.id.replace('qty_','');
    const chk=document.getElementById('chk_'+rk);
    if(!chk||!chk.checked)return;
    const potes=parseFloat(inp.value)||0;
    const uf=parseFloat(inp.dataset.uf)||0.10;
    const dg=parseFloat(inp.dataset.dg)||uf;
    const cj=parseFloat(inp.dataset.cj)||6;
    const com=parseFloat(inp.dataset.com)||0;
    // Precio según cantidad: si >= caja completa → descuento grande
    const descActivo=potes>=cj?dg:uf;
    const precio=com*(1-descActivo);
    const costo=potes*precio;
    const ivaItem=costo*IVA/(1+IVA);
    costoTotal+=costo;ivaTotal+=ivaItem;
    const costoEl=document.getElementById('costo_'+rk);
    if(costoEl)costoEl.textContent=peso(costo);
    // Actualizar label de descuento
    const descEl=document.getElementById('desc_'+rk);
    if(descEl){
      if(potes>=cj&&cj>0){
        descEl.innerHTML='<span style="color:var(--ver)">✓ Caja completa — descuento −'+Math.round(dg*100)+'% aplicado</span>';
      } else if(potes>0&&cj>0){
        descEl.innerHTML='<span style="color:var(--gt)">Descuento −'+Math.round(uf*100)+'% · agregá '+(cj-potes)+' más para caja completa (−'+Math.round(dg*100)+'%)</span>';
      }
    }
  });
  // Actualizar totales dinámicos
  const costoNeto=costoTotal/(1+IVA);
  const utilNeta=parseFloat(document.getElementById('dynUtilFinal')?.dataset?.base||0);
  const elNeto=document.getElementById('dynCostoNeto');
  const elIva=document.getElementById('dynIvaCredito');
  const elUtil=document.getElementById('dynUtilFinal');
  if(elNeto)elNeto.textContent='− '+peso(costoNeto);
  if(elIva)elIva.textContent='+ '+peso(ivaTotal)+' a favor';
  // Leer utilidad base del atributo data
  const utilBase=parseFloat(document.getElementById('dynUtilFinal')?.dataset?.utilbase||0);
  const utilFinal=utilBase-costoNeto;
  if(elUtil){
    elUtil.textContent=peso(utilFinal);
    elUtil.style.color=utilFinal>=0?'var(--ora)':'var(--roj)';
  }
}

function handleFile(f){

  r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'array'});rawRows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});

  r.readAsArrayBuffer(f);

function procFile(){
  if(!rawRows.length){demo('mayo');return;}
  let hr=-1;for(let i=0;i<rawRows.length;i++){if(rawRows[i].some(c=>String(c).includes('Goods Name'))){hr=i;break;}}
  if(hr<0){alert('No encontré columna "Goods Name"');return;}
  const h=rawRows[hr];const iG=h.findIndex(x=>String(x).includes('Goods'));const iS=h.findIndex(x=>String(x).toLowerCase().includes('order status'));
  const ind={},comb={};let tx=0;
  for(let i=hr+1;i<rawRows.length;i++){const row=rawRows[i];if(!row[iG]||String(row[iS]).trim()!=='Complete')continue;tx++;const gn=String(row[iG]).trim();
    if(P.find(p=>p.g===gn))ind[gn]=(ind[gn]||0)+1;else if(CB.find(c=>c.g===gn))comb[gn]=(comb[gn]||0)+1;}
  renderResults({name:$('mNm').value,code:$('mCd').value,period:$('mPr').value,tipo:$('mTp').value,totalTx:tx,ind,comb});
}

function renderResults(d){
  CD=d;
  const maq=getMaq(d.code,d.name,d.tipo);
  go('resultado');
  $('noRes').style.display='none';$('resContent').style.display='block';
  $('rTit').textContent=($('mNm').value||d.name)+' — '+($('mPr').value||d.period);
  const tb=d.tipo==='VIN'?'<span class="tvin">VIN</span>':'<span class="tfr">Franquiciado</span>';
  $('rSub').innerHTML=d.code+' · '+tb+' · '+d.totalTx+' transacciones';
  $('ttipo').innerHTML=tb;$('gVq').value=d.totalTx;

  const IVA=PAR.IVA/100,MP=PAR.MP/100;
  // Para franquiciados, comisión VIN siempre 5%
  const gymPctRaw=CU&&CU.role==='franq'?5:parseFloat($('gGp').value)||0;
  const gymP=gymPctRaw/100;
  const impP=(parseFloat($('gIp').value)||0)/100;
  const esVIN=d.tipo==='VIN';

  // Ventas + consumo gs
  let fact=0,utilProd=0;
  const rows=[];const consGs={};P.forEach(p=>{consGs[p.rk]=0;});

  // Mapear combos → componentes
  const ccMap={};
  CB.forEach(c=>{[c.k1,c.k2].forEach(k=>{if(!ccMap[k])ccMap[k]=0;Object.entries(d.comb||{}).forEach(([gn,cnt])=>{if(gn===c.g)ccMap[k]=(ccMap[k]||0)+cnt;});});});

  Object.entries(d.ind||{}).forEach(([gn,cnt])=>{
    const p=P.find(x=>x.g===gn);if(!p||!cnt)return;
    const f=cnt*p.pv;fact+=f;
    const neto=p.pv/(1+IVA);
    const costoVIN=p.com*(1-p.d);
    const costoPote=esVIN?costoVIN:p.com*(1-p.uf); // franq = comercial × (1-desc%)
    const costoSbruto=costoPote/p.sv;             // costo/serv c/IVA
    const costoS=costoSbruto/(1+IVA);            // costo/serv neto s/IVA
    const util=(neto-costoS)*cnt;utilProd+=util;
    const gananciaS=p.pv-costoSbruto; const ganancia=gananciaS*cnt;
    rows.push({nombre:p.i,marca:p.m,unid:cnt,fact:f,pvu:p.pv,costoSbruto,costoS,neto,utilS:neto-costoS,util,gananciaS,ganancia,tipo:'ind',rk:p.rk});
    consGs[p.rk]+=cnt*(p.pG/p.sv);
  });
  Object.entries(d.comb||{}).forEach(([gn,cnt])=>{
    const c=CB.find(x=>x.g===gn);if(!c||!cnt)return;
    const f=cnt*c.pv;fact+=f;
    let costoC=0;
    [c.k1,c.k2].forEach(k=>{const p=P.find(x=>x.rk===k);if(!p)return;const cv=p.com*(1-p.d);const cp=esVIN?cv:p.com*(1-p.uf);costoC+=(cp/p.sv)/(1+IVA);consGs[k]+=cnt*(p.pG/p.sv);});
    const neto=c.pv/(1+IVA);const util=(neto-costoC)*cnt;utilProd+=util;
    const gananciaComboS=c.pv-costoC*(1+IVA); const gananciaCombo=gananciaComboS*cnt;
    rows.push({nombre:c.i,marca:'Combo',unid:cnt,fact:f,pvu:c.pv,costoS:costoC,neto,utilS:neto-costoC,util,gananciaS:gananciaComboS||0,ganancia:gananciaCombo||0,tipo:'comb'});
  });
  rows.sort((a,b)=>b.fact-a.fact);

    const cv=p.com*(1-p.d);const cp=esVIN?cv:p.com*(1-p.uf);const costoItem=potes*cp;
    costoRepoTotal+=costoItem;
    repoItems.push({p,indiv,comb,tot,gs,gsTotal,dec,potes,cp,costoItem});

function confirmarCompra(items){
  if(!CD) return;
  const maq = getMaq(CD.code);
  if(!maq) return;
  const IVA = PAR.IVA/100;
  
  // Deshabilitar botón para evitar doble click
  const btn = document.querySelector('.btn-confirmar-compra');
  if(btn){ btn.disabled = true; btn.textContent = '⏳ Registrando...'; }
  
  let totalCompra = 0, ivaCompra = 0;
  const detalle = [];
  
  items.forEach(({rk, gs, precio, potes}) => {
    if(!potes || potes <= 0) return;
    // Actualizar stock directamente
    maq.stock[rk] = (maq.stock[rk] || 0) + gs;
    const costoItem = potes * precio;
    const ivaItem = costoItem * IVA / (1 + IVA);
    totalCompra += costoItem;
    ivaCompra += ivaItem;
    const p = P.find(x => x.rk === rk);
    detalle.push({rk, nombre: p ? p.i : rk, potes, precio, costoItem, ivaItem});
  });
  
  if(detalle.length === 0){
    if(btn){ btn.disabled = false; btn.textContent = '✓ Confirmar compra y actualizar stock'; }
    return;
  }
  
  // Registrar compra en historial
  if(!maq.compras) maq.compras = [];
  maq.compras.unshift({
    id: Date.now(),
    fecha: new Date().toLocaleDateString('es-AR'),
    period: CD.period || '',
    detalle,
    totalCompra,
    ivaCompra
  });
  
  // Recalcular stock desde cero para consistencia
  recalcStock(maq);
  recalcInv(maq);
  savMAQ();
  
  // Feedback visual
  if(btn){
    btn.disabled = false;
    btn.textContent = '✓ Compra registrada exitosamente';
    btn.style.background = 'var(--ver)';
    setTimeout(() => {
      btn.textContent = '✓ Confirmar compra y actualizar stock';
      btn.style.background = '';
    }, 3000);
  }
  
  renderMaquina();
  // Actualizar resultado si está visible
  if(CD && document.getElementById("pg-resultado").classList.contains("on")) renderResults(CD);
  // Actualizar stock si está visible  
  if(document.getElementById("pg-stock").classList.contains("on")) renderStock();
}

function saveMonth(){
  if(!CD) return;
  const maq = getMaq(CD.code, CD.name||CD.machine, CD.tipo);
  const pm = maq._pend;
  if(!pm){ alert('Calculá el resultado primero.'); return; }
  
  // Deshabilitar botón para evitar doble click
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '⏳ Guardando...';
  
  // Verificar stock negativo
  const sinStock = [];
  Object.entries(pm.consGs).forEach(([rk, gs]) => {
    const p = P.find(x => x.rk === rk);
    if(!p) return;
    // Calcular stock actual simulado (CI + compras - meses anteriores)
    const calc = {};
    P.forEach(pp => { const ci=maq.ci[pp.rk]; calc[pp.rk]=(ci&&ci.potes)?ci.potes*pp.pG:0; });
    (maq.compras||[]).forEach(c=>(c.detalle||[]).forEach(d=>{const pp=P.find(x=>x.rk===d.rk);if(pp&&d.potes)calc[pp.rk]=(calc[pp.rk]||0)+d.potes*pp.pG;}));
    (maq.meses||[]).forEach(m=>Object.entries(m.consGs||{}).forEach(([r,g])=>{calc[r]=(calc[r]||0)-g;}));
    const disponible = Math.max(0, calc[rk] || 0);
    if(gs > disponible){
      const falta = gs - disponible;
      sinStock.push('• '+p.i+': consumiste '+gs.toFixed(0)+'g pero tenés '+disponible.toFixed(0)+'g (faltan '+(falta/p.pG).toFixed(2)+' potes)');
    }
  });
  
  if(sinStock.length > 0){
    const ok = confirm('⚠️ Stock insuficiente:\n\n'+sinStock.join('\n')+'\n\n¿Guardar igual?');
    if(!ok){
      btn.disabled = false;
      btn.textContent = '💾 Guardar mes';
      return;
    }
  }
  
  // Guardar mes
  maq.meses.push({
    ...CD,
    consGs: pm.consGs,
    stockTras: pm.stockTras,
    utilNeta: pm.utilNeta,
    utilProd: pm.utilProd,
    totalFact: pm.fact,
    savedAt: new Date().toLocaleDateString('es-AR'),
    id: Date.now()
  });
  maq._pend = null;
  
  // Recalcular stock y guardar
  recalcStock(maq);
  savMAQ();
  
  // Feedback visual claro
  btn.disabled = false;
  btn.textContent = '✓ Mes guardado';
    btn.disabled = true;

  renderMaquina();
}

function updateCITotals(maq){
  const IVA=PAR.IVA/100;let totB=0,totIva=0,totN=0;
  P.forEach(p=>{const ci=maq.ci[p.rk]||{potes:0,precio:0};const b=ci.potes*ci.precio;const iv=b*IVA/(1+IVA);totB+=b;totIva+=iv;totN+=b-iv;});
  // Calcular total perfil chico para comparar
  let totChico=0;
  P.forEach(p=>{
    const ci=maq.ci[p.rk];if(!ci||!ci.potes)return;
    const precioChico=p.com*(1-(p.uf||0.10));
    totChico+=ci.potes*precioChico;
  });

function recalcStock(maq){
  // Reconstruir stock desde cero en cada llamada
  // Formula: stock = CI_gramos + compras_adicionales_gramos - consumo_acumulado_gramos
  const calc = {};
  
  // Paso 1: stock inicial = CI
  P.forEach(p => {
    const ci = maq.ci[p.rk];
    calc[p.rk] = (ci && ci.potes > 0) ? ci.potes * p.pG : 0;
  });
  
  // Paso 2: sumar compras adicionales registradas en maq.compras
  (maq.compras || []).forEach(compra => {
    (compra.detalle || []).forEach(d => {
      const p = P.find(x => x.rk === d.rk);
      if (p && d.potes > 0) {
        calc[p.rk] = (calc[p.rk] || 0) + d.potes * p.pG;
      }
    });
  });
  
  // Paso 3: restar consumo de cada mes guardado
  (maq.meses || []).forEach(mes => {
    Object.entries(mes.consGs || {}).forEach(([rk, gs]) => {
      calc[rk] = (calc[rk] || 0) - gs;
    });
  });
  
  // Paso 4: aplicar al objeto stock (nunca negativo en display)
  P.forEach(p => {
    maq.stock[p.rk] = Math.max(0, calc[p.rk] || 0);
  });
}

function aplicarSugerida(perfil){
  const maq=getMaq($('mCd').value||'E00225');
  const ci=perfil==='chico'?CI_CHICO:CI_GRANDE;
  const desc=perfil==='grande'?'dg':'uf'; // dg=−12% grande, uf=−10% chico
  P.forEach(p=>{

            items.push('<div style="padding:10px 0;border-bottom:1px solid #1d1d1d"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div><strong style="font-size:13px">'+c.fecha+'</strong>'+(c.period?' <span style="font-size:11px;color:var(--gt)">· '+c.period+'</span>':'')+'  <span style="font-size:10px;background:rgba(34,197,94,.15);color:#4ADE80;padding:1px 6px;border-radius:4px;margin-left:4px">REPOSICIÓN</span></div><div><span style="color:var(--ora);font-weight:700">'+peso(c.totalCompra)+'</span> <span style="font-size:11px;color:var(--ver);margin-left:6px">IVA: '+peso(c.ivaCompra)+'</span></div></div><table style="font-size:11px"><tbody>'+rows+'</tbody></table></div>');
          });
          // 2. Compra inicial al final
          const ciTotal=P.reduce((s,p)=>{const ci=maq.ci[p.rk];return s+(ci&&ci.potes?ci.potes*ci.precio:0);},0);
          if(ciTotal>0){
            const ciRows=P.filter(p=>maq.ci[p.rk]&&maq.ci[p.rk].potes>0).map(p=>'<tr><td style="color:var(--gt);padding:2px 0">'+p.i+'</td><td style="text-align:right;padding:2px 8px;color:var(--gt)">'+maq.ci[p.rk].potes+' potes</td><td style="text-align:right;color:var(--ora)">'+peso(maq.ci[p.rk].potes*maq.ci[p.rk].precio)+'</td></tr>').join('');

          }
          if(!items.length) return '<div style="color:var(--gt);font-size:13px">No hay compras registradas.</div>';
          const totalAcum=ciTotal+(maq.compras||[]).reduce((s,c)=>s+c.totalCompra,0);
          return items.join('')+'<div style="padding:10px 0;display:flex;justify-content:space-between;font-weight:700"><span>Total invertido acumulado</span><span style="color:var(--ora)">'+peso(totalAcum)+'</span></div>';
        })()}
      </div>
    </div>`;
}

function renderGlobal(){
  const entries=Object.values(MAQ);
  if(!entries.length){$('globalCnt').innerHTML='<div style="text-align:center;padding:2rem;color:var(--gt)">Sin máquinas.</div>';return;}
  const IVA_G=PAR.IVA/100;
  let totUtil=0,totInv=0,totFact=0;
  const rows=entries.map(mq=>{
    recalcInv(mq);
    const util=mq.meses.reduce((s,m)=>s+(m.utilNeta||0),0);
    const fact=mq.meses.reduce((s,m)=>s+(m.totalFact||0),0);
    const comprasAdc=(mq.compras||[]).reduce((s,c)=>s+c.totalCompra,0);
    const invNeto=(mq.invTotal||0)/(1+IVA_G)+(comprasAdc/(1+IVA_G));
    const saldo=util-invNeto;
    const eq=saldo>=0&&invNeto>0;
    totUtil+=util;totInv+=invNeto;totFact+=fact;
    return '<tr><td><strong>'+(mq.name||mq.code)+'</strong> <span style="font-size:11px;color:var(--gt)">'+mq.code+'</span></td>'
      +'<td>'+(mq.tipo==='VIN'?'<span class="tvin">VIN</span>':'<span class="tfr">Franquiciado</span>')+'</td>'
      +'<td style="text-align:right">'+mq.meses.length+'</td>'
      +'<td style="text-align:right;color:var(--gt)">'+peso(fact)+'</td>'
      +'<td style="text-align:right;color:'+(util>=0?'var(--ver)':'var(--roj)')+'"><strong>'+peso(util)+'</strong></td>'
      +'<td style="text-align:right;color:var(--gt)">'+peso(invNeto)+'</td>'
      +'<td style="text-align:right;color:'+(saldo>=0?'var(--ver)':'var(--roj)')+'"><strong>'+peso(saldo)+'</strong></td>'
      +'<td>'+(eq?'<span class="bdg bve">✅ Recuperada</span>':'<span class="bdg bam2">⏳ En curso</span>')+'</td></tr>';
  }).join('');
  const saldoTotal=totUtil-totInv;
  $('globalCnt').innerHTML='<table><thead><tr><th>Máquina</th><th>Tipo</th><th style="text-align:right">Meses</th><th style="text-align:right">Facturado</th><th style="text-align:right">Util. acumulada</th><th style="text-align:right">Inversión neta</th><th style="text-align:right">Saldo neto</th><th>Equilibrio</th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr style="border-top:1px solid var(--gb)"><td colspan="3" style="font-weight:600;padding-top:10px;color:var(--gt)">TOTAL</td><td style="text-align:right;font-weight:600;padding-top:10px">'+peso(totFact)+'</td><td style="text-align:right;font-weight:700;padding-top:10px;color:var(--ver)">'+peso(totUtil)+'</td><td style="text-align:right;font-weight:600;padding-top:10px;color:var(--gt)">'+peso(totInv)+'</td><td style="text-align:right;font-weight:700;padding-top:10px;color:'+(saldoTotal>=0?'var(--ora)':'var(--roj)')+'">'+peso(saldoTotal)+'</td><td></td></tr></tfoot></table>';
}

function abrirCompraManual(){
  const code = (CD && CD.code) || $('mCd').value || 'E00225';
  const maq = MAQ[code] || getMaq(code);
  const IVA = PAR.IVA/100;
  const esVIN = (maq.tipo || 'VIN') === 'VIN';

  let html = '';
  P.forEach(p => {
    const ci = maq.ci[p.rk];
    if(!ci || !ci.potes) return; // solo productos con CI
    const costoVIN = p.com*(1-p.d);
    const precio = esVIN ? costoVIN : p.com*(1-p.uf);
    html += `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #1d1d1d">
      <div style="flex:1;font-size:13px"><strong>${p.i}</strong> <span class="bdg ${getMB(p.m)}" style="font-size:9px">${p.m}</span></div>
      <div style="font-size:11px;color:var(--gt)">$${Math.round(precio).toLocaleString('es-AR')}/pote</div>
      <input type="number" id="mcp_${p.rk}" value="0" min="0" max="99" step="1"
        data-precio="${precio}" data-pg="${p.pG}"
        oninput="recalcModal()"
        style="width:65px;text-align:center;background:var(--g2);border:1px solid var(--gb);border-radius:7px;padding:6px;color:var(--bla);font-size:13px">
      <span style="font-size:11px;color:var(--gt)">potes</span>
    </div>`;
  });
  $('modalCompraItems').innerHTML = html;
  recalcModal();
  $('modalCompra').style.display = 'flex';
}

function cerrarCompraManual(){
  $('modalCompra').style.display = 'none';
}

function recalcModal(){
  const IVA = PAR.IVA/100;
  let total = 0, ivaTotal = 0;
  document.querySelectorAll('[id^="mcp_"]').forEach(inp => {
    const potes = parseFloat(inp.value) || 0;
    const precio = parseFloat(inp.dataset.precio) || 0;
    const costo = potes * precio;
    total += costo;
    ivaTotal += costo * IVA/(1+IVA);
  });
  $('modalTotal').textContent = '$' + Math.round(total).toLocaleString('es-AR');
  $('modalIva').textContent = '$' + Math.round(ivaTotal).toLocaleString('es-AR');
}

function confirmarCompraManual(){
  const code = (CD && CD.code) || $('mCd').value || 'E00225';
  const maq = getMaq(code);
  const IVA = PAR.IVA/100;
  const items = [];

  document.querySelectorAll('[id^="mcp_"]').forEach(inp => {
    const rk = inp.id.replace('mcp_', '');
    const potes = parseInt(inp.value) || 0;
    if(potes <= 0) return;
    const precio = parseFloat(inp.dataset.precio) || 0;
    const pG = parseFloat(inp.dataset.pg) || 0;
    items.push({rk, potes, gs: potes*pG, precio});
  });

  if(!items.length){ alert('Ingresá al menos un producto.'); return; }

  // Deshabilitar botón
  const btn = event.target;
  btn.disabled = true; btn.textContent = '⏳ Registrando...';

  // Procesar compra
  let totalCompra = 0, ivaCompra = 0;
  const detalle = [];
  items.forEach(({rk, gs, precio, potes}) => {
    maq.stock[rk] = (maq.stock[rk] || 0) + gs;
    const costoItem = potes * precio;
    const ivaItem = costoItem * IVA/(1+IVA);
    totalCompra += costoItem; ivaCompra += ivaItem;
    const p = P.find(x => x.rk === rk);
    detalle.push({rk, nombre: p ? p.i : rk, potes, precio, costoItem, ivaItem});
  });

  if(!maq.compras) maq.compras = [];
  maq.compras.unshift({
    id: Date.now(),
    fecha: new Date().toLocaleDateString('es-AR'),
    period: CD ? (CD.period || '') : '',
    detalle, totalCompra, ivaCompra
  });

  recalcStock(maq);
  recalcInv(maq);
  savMAQ();

  cerrarCompraManual();
  renderStock();
  renderMaquina();
  if(CD && document.getElementById('pg-resultado').classList.contains('on')) renderResults(CD);

  // Notificación
  const notif = document.createElement('div');
  notif.textContent = '✓ Compra registrada — stock actualizado';
  notif.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ver);color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:300;animation:fadeIn .3s';
  document.body.appendChild(notif);
  setTimeout(() => notif.remove(), 3000);
}

function recalcMarket(){
  const IVA=PAR.IVA/100;let total=0;
  document.querySelectorAll('[id^="mkt_"]').forEach(inp=>{
    const rk=inp.id.replace('mkt_','');
    const potes=parseFloat(inp.value)||0;
    const chico=parseFloat(inp.dataset.chico)||0;
    const grande=parseFloat(inp.dataset.grande)||0;
    const cj=parseFloat(inp.dataset.cj)||6;
    const precio=potes>=cj?grande:chico;
    const costo=potes*precio;
    total+=costo;
    const el=$('mktP_'+rk);
    if(el){el.textContent=potes>0?'$'+Math.round(costo).toLocaleString('es-AR'):'$0';el.style.color=potes>=cj&&cj>0?'var(--ver)':'var(--ora)';}
  });
  const mt=$('marketTotal'),mi=$('marketIva'),mn=$('marketNeto');
  const ivaTotal=total*PAR.IVA/100/(1+PAR.IVA/100);
  if(mt)mt.textContent='$'+Math.round(total).toLocaleString('es-AR');
  if(mi)mi.textContent='$'+Math.round(ivaTotal).toLocaleString('es-AR');
  if(mn)mn.textContent='$'+Math.round(total/(1+PAR.IVA/100)).toLocaleString('es-AR');
}

function generarPedido(){
  const code=MAQ_ACTIVA||$('mCd').value||'E00225';
  const maq=MAQ[code]||getMaq(code);
  const IVA=PAR.IVA/100;
  const items=[];let total=0,iva=0;
  document.querySelectorAll('[id^="mkt_"]').forEach(inp=>{
    const rk=inp.id.replace('mkt_','');
    const potes=parseFloat(inp.value)||0;if(!potes)return;
    const p=P.find(x=>x.rk===rk);if(!p)return;
    const chico=parseFloat(inp.dataset.chico)||0;
    const grande=parseFloat(inp.dataset.grande)||0;
    const cj=parseFloat(inp.dataset.cj)||6;
    const precio=potes>=cj?grande:chico;
    const costo=potes*precio;const ivaItem=costo*IVA/(1+IVA);
    total+=costo;iva+=ivaItem;
    items.push({rk,nombre:p.i,potes,precio,costo,ivaItem,esCaja:potes>=cj,cj});
  });
  if(!items.length){alert('Agrega al menos un producto.');return;}
  const fecha=new Date().toLocaleDateString('es-AR');
  let resHtml='<div style="font-size:12px;color:var(--gt);margin-bottom:10px">'+fecha+' — <strong style="color:var(--bla)">'+maq.name+'</strong></div>';
  let txt='PEDIDO VIN MARKET\nFecha: '+fecha+'\nMaquina: '+maq.name+' ('+code+')\n\n';
  items.forEach(it=>{
    resHtml+='<div class="fr"><span class="fl">'+it.nombre+(it.esCaja?' <span class="bdg bve" style="font-size:9px">CAJA</span>':'')+'</span><span>'+it.potes+' potes · <strong style="color:var(--ora)">$'+Math.round(it.costo).toLocaleString('es-AR')+'</strong></span></div>';
    txt+=it.nombre+': '+it.potes+' potes = $'+Math.round(it.costo).toLocaleString('es-AR')+(it.esCaja?' (caja completa)':'')+'\n';
  });
  resHtml+='<div class="fr sub"><span class="fl b">Total c/IVA</span><span style="color:var(--ora);font-weight:700">$'+Math.round(total).toLocaleString('es-AR')+'</span></div>';
  resHtml+='<div class="fr"><span class="fl">IVA credito</span><span style="color:var(--ver)">$'+Math.round(iva).toLocaleString('es-AR')+'</span></div>';
  txt+='\nTOTAL: $'+Math.round(total).toLocaleString('es-AR')+' (IVA: $'+Math.round(iva).toLocaleString('es-AR')+')';
  $('marketResumen').innerHTML=resHtml;
  const card=$('marketResumenCard');card.style.display='';
  card.dataset.items=JSON.stringify(items);card.dataset.txt=txt;
  card.dataset.total=total;card.dataset.iva=iva;
}

function confirmarPedidoMarket(){
  const code=MAQ_ACTIVA||$('mCd').value||'E00225';
  const maq=getMaq(code);
  const card=$('marketResumenCard');
  const items=JSON.parse(card.dataset.items||'[]');
  const total=parseFloat(card.dataset.total||0);
  const ivaCompra=parseFloat(card.dataset.iva||0);
  if(!items.length)return;
  const btn=event.target;btn.disabled=true;btn.textContent='Confirmando...';
  const detalle=[];
  items.forEach(it=>{
    const p=P.find(x=>x.rk===it.rk);
    maq.stock[it.rk]=(maq.stock[it.rk]||0)+it.potes*(p?p.pG:0);
    detalle.push({rk:it.rk,nombre:it.nombre,potes:it.potes,precio:it.precio,costoItem:it.costo,ivaItem:it.ivaItem});
  });
  if(!maq.compras)maq.compras=[];
  maq.compras.unshift({id:Date.now(),fecha:new Date().toLocaleDateString('es-AR'),period:'Market',detalle,totalCompra:total,ivaCompra});
  recalcStock(maq);recalcInv(maq);savMAQ();
  btn.disabled=false;btn.textContent='Confirmado';btn.style.background='var(--ver)';
  card.style.display='none';
  document.querySelectorAll('[id^="mkt_"]').forEach(i=>i.value=0);
  recalcMarket();updateAlertaBadge();
  const n=document.createElement('div');n.textContent='Stock actualizado';
  n.style.cssText='position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ver);color:#fff;padding:12px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:300';
  document.body.appendChild(n);setTimeout(()=>n.remove(),3000);
}

function copiarPedido(){
  const txt=$('marketResumenCard').dataset.txt||'';
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=event.target;const orig=btn.textContent;
    btn.textContent='Copiado';btn.style.background='var(--ver)';
    setTimeout(()=>{btn.textContent=orig;btn.style.background='';},1500);
  });
}

// ══ ALERTAS + CONSOLIDADO + REDISTRIBUCIÓN ═══════════════
function renderAlertas(){
  const codigos=Object.keys(MAQ);
  if(!codigos.length){$('alertasCnt').innerHTML='<div style="text-align:center;padding:3rem;color:var(--gt)">Sin maquinas.</div>';return;}
  codigos.forEach(c=>recalcStock(MAQ[c]));
  const alertP=PAR.AL/100;
  let html='';

  // Nivel 1: alertas por maquina
  const conAlerta=[];
  codigos.forEach(code=>{
    const maq=MAQ[code];
    const alertas=P.filter(p=>{
      if(maq.inactivos&&maq.inactivos[p.rk])return false;
      if(!maq.ci[p.rk]||!maq.ci[p.rk].potes)return false;
      return(maq.stock[p.rk]||0)<=p.rs*p.pG*alertP;
    });
    if(alertas.length)conAlerta.push({code,maq,alertas});
  });

  if(conAlerta.length){
    html+='<div class="ct" style="margin-bottom:.75rem;color:var(--roj)">Alertas por maquina</div>';
    conAlerta.forEach(({code,maq,alertas})=>{
      html+='<div class="card" style="border-color:rgba(239,68,68,.4);margin-bottom:.875rem"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div><div style="font-size:15px;font-weight:700">'+maq.name+' <span style="font-size:11px;color:var(--gt)">'+code+'</span></div><div style="font-size:12px;color:var(--gt)">'+maq.tipo+' — '+alertas.length+' producto(s) bajo nivel</div></div><button class="btn bp bsm" onclick="cambiarMaquina(\''+code+'\');go(\'market\')">Reponer</button></div>';
      html+='<table><thead><tr><th>Producto</th><th style="text-align:right">Stock</th><th style="text-align:right">Minimo</th><th style="text-align:right">Estado</th></tr></thead><tbody>';
      alertas.forEach(p=>{
        const gs=maq.stock[p.rk]||0;
        const st=gs<=0?'Sin stock':'Bajo';
        html+='<tr><td><strong>'+p.i+'</strong> <span class="bdg '+getMB(p.m)+'">'+p.m+'</span></td><td style="text-align:right;color:var(--roj);font-weight:600">'+(gs/p.pG).toFixed(2)+' potes</td><td style="text-align:right;color:var(--gt)">'+p.rs+' pote(s)</td><td style="text-align:right"><span class="bdg bre">'+st+'</span></td></tr>';
      });
      html+='</tbody></table></div>';
    });
  } else {
    html+='<div class="card cv" style="margin-bottom:.875rem"><div style="display:flex;align-items:center;gap:14px"><div style="font-size:2.5rem">✅</div><div><div style="font-weight:700;color:var(--ver);font-size:15px">Todas las maquinas en buen nivel</div><div style="font-size:13px;color:var(--gt);margin-top:4px">Ningun producto bajo del '+PAR.AL+'% de reserva.</div></div></div></div>';
  }

  // Nivel 2: stock consolidado
  if(codigos.length>0){
    html+='<div class="ct" style="margin:1.5rem 0 .75rem">Stock consolidado — todas las maquinas</div>';
    html+='<div class="card"><div style="font-size:12px;color:var(--gt);margin-bottom:12px">Stock total sumando todas las maquinas. Util para ver si conviene redistribuir antes de comprar.</div><div style="overflow-x:auto"><table><thead><tr><th>Producto</th>';
    codigos.forEach(c=>{
      const nm=MAQ[c].name.replace('SC-','');
      html+='<th style="text-align:right;font-size:11px">'+nm+'</th>';
    });
    html+='<th style="text-align:right;font-weight:700">TOTAL</th></tr></thead><tbody>';
    P.forEach(p=>{
      const tieneEnAlguna=codigos.some(c=>MAQ[c].ci[p.rk]&&MAQ[c].ci[p.rk].potes>0);
      if(!tieneEnAlguna)return;
      const stockPorMaq=codigos.map(c=>{
        const gs=MAQ[c].stock[p.rk]||0;
        const potes=gs/p.pG;
        const inactivo=MAQ[c].inactivos&&MAQ[c].inactivos[p.rk];
        const enAlerta=!inactivo&&gs<=p.rs*p.pG*alertP;
        return{gs,potes,enAlerta,inactivo};
      });
      const totalGs=stockPorMaq.reduce((s,x)=>s+x.gs,0);
      const totalPotes=totalGs/p.pG;
      html+='<tr><td><strong>'+p.i+'</strong> <span class="bdg '+getMB(p.m)+'" style="font-size:9px">'+p.m+'</span></td>';
      stockPorMaq.forEach(s=>{
        const color=s.inactivo?'var(--gt)':s.enAlerta?'var(--roj)':s.potes<1?'var(--ama)':'var(--bla)';
        html+='<td style="text-align:right;color:'+color+';font-weight:'+(s.enAlerta?700:400)+'">'+(s.inactivo?'—':s.potes.toFixed(1))+'</td>';
      });
      const colorTotal=totalPotes<1?'var(--roj)':totalPotes<2?'var(--ama)':'var(--ver)';
      html+='<td style="text-align:right;font-weight:700;color:'+colorTotal+'">'+totalPotes.toFixed(1)+'</td></tr>';
    });
    html+='</tbody></table></div></div>';
  }

  // Nivel 3: redistribucion (solo si hay mas de 1 maquina)
  if(codigos.length>1){
    const sugerencias=[];
    P.forEach(p=>{
      const tieneEnAlguna=codigos.some(c=>MAQ[c].ci[p.rk]&&MAQ[c].ci[p.rk].potes>0);
      if(!tieneEnAlguna)return;
      codigos.forEach(codeDest=>{
        const maqDest=MAQ[codeDest];
        if(!maqDest.ci[p.rk]||!maqDest.ci[p.rk].potes)return;
        if(maqDest.inactivos&&maqDest.inactivos[p.rk])return;
        const gsDest=maqDest.stock[p.rk]||0;
        if(gsDest>p.rs*p.pG*alertP)return;
        codigos.forEach(codeOrig=>{
          if(codeOrig===codeDest)return;
          const maqOrig=MAQ[codeOrig];
          const gsOrig=maqOrig.stock[p.rk]||0;
          const potesOrig=gsOrig/p.pG;
          const excedente=potesOrig-p.rs*2;
          if(excedente<1)return;
          const potesAMover=Math.min(Math.floor(excedente),Math.max(1,Math.ceil(p.rs-(gsDest/p.pG))));
          if(potesAMover<1)return;
          sugerencias.push({p,codeOrig,maqOrig,codeDest,maqDest,potesAMover,gsOrig,gsDest});
        });
      });
    });
    if(sugerencias.length){
      html+='<div class="ct" style="margin:1.5rem 0 .75rem">Sugerencias de redistribucion</div>';
      html+='<div class="card caz"><div style="font-size:12px;color:var(--gt);margin-bottom:12px">Antes de comprar, mova stock entre maquinas. Confirma para registrar el movimiento.</div>';
      sugerencias.forEach((s,idx)=>{
        html+='<div style="padding:10px 0;border-bottom:1px solid #1d1d1d"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><div style="flex:1;min-width:160px"><div style="font-size:13px;font-weight:600">'+s.p.i+' <span class="bdg '+getMB(s.p.m)+'">'+s.p.m+'</span></div><div style="font-size:11px;color:var(--gt);margin-top:3px"><span style="color:var(--ver)">'+s.maqOrig.name+'</span> tiene '+(s.gsOrig/s.p.pG).toFixed(1)+' potes → <span style="color:var(--roj)">'+s.maqDest.name+'</span> tiene '+(s.gsDest/s.p.pG).toFixed(1)+' potes</div></div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:var(--gt)">Mover:</span><input type="number" id="rdq_'+idx+'" value="'+s.potesAMover+'" min="1" max="'+Math.floor(s.gsOrig/s.p.pG)+'" style="width:55px;text-align:center;background:var(--g2);border:1px solid var(--gb);border-radius:7px;padding:5px;color:var(--bla);font-size:13px"><span style="font-size:12px;color:var(--gt)">potes</span><button class="btn bp bsm" onclick="confirmarRedistribucion(\''+s.p.rk+'\',\''+s.codeOrig+'\',\''+s.codeDest+'\',\'rdq_'+idx+'\')">Confirmar</button></div></div></div>';
      });
      html+='</div>';
    }
  }

  $('alertasCnt').innerHTML=html;
}

function confirmarRedistribucion(rk,codeOrig,codeDest,inputId){
  const potes=parseInt(document.getElementById(inputId)?.value||0);
  if(!potes||potes<1){alert('Ingresa una cantidad valida.');return;}
  const maqOrig=MAQ[codeOrig];const maqDest=MAQ[codeDest];
  const p=P.find(x=>x.rk===rk);
  if(!maqOrig||!maqDest||!p)return;
  const gs=potes*p.pG;
  const disponible=maqOrig.stock[rk]||0;
  if(gs>disponible){alert('No hay suficiente stock en '+maqOrig.name+'. Disponible: '+(disponible/p.pG).toFixed(1)+' potes');return;}
  const btn=event.target;btn.disabled=true;btn.textContent='Moviendo...';
  maqOrig.stock[rk]=Math.max(0,disponible-gs);
  maqDest.stock[rk]=(maqDest.stock[rk]||0)+gs;
  if(!maqDest.compras)maqDest.compras=[];
  const fecha=new Date().toLocaleDateString('es-AR');
  maqDest.compras.unshift({id:Date.now(),fecha,period:'Transferencia',detalle:[{rk,nombre:p.i,potes,precio:0,costoItem:0,ivaItem:0}],totalCompra:0,ivaCompra:0});
  recalcStock(maqOrig);recalcStock(maqDest);savMAQ();
  const notif=document.createElement('div');
  notif.textContent=potes+' potes de '+p.i+' movidos de '+maqOrig.name+' a '+maqDest.name;
  notif.style.cssText='position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ver);color:#fff;padding:12px 18px;border-radius:9px;font-size:13px;font-weight:600;z-index:300;max-width:380px';
  document.body.appendChild(notif);setTimeout(()=>notif.remove(),4000);
  renderAlertas();updateAlertaBadge();
}

// ══ NUEVA MAQUINA ═════════════════════════════════════════
async function renderNuevaMaquina(){
  const sel=$('nmUsuario');if(!sel)return;
  if(ONLINE_MODE){
    const users=await sbGet('usuarios');
    if(users)sel.innerHTML='<option value="">— selecciona —</option>'+users.map(u=>'<option value="'+u.id+'">'+u.nombre+' ('+u.username+')</option>').join('');
  }
}

async function crearMaquina(){
  const codigo=$('nmCodigo').value.trim().toUpperCase();
  const nombre=$('nmNombre').value.trim();
  const tipo=$('nmTipo').value;
  const usuarioId=$('nmUsuario').value;
  const msg=$('nmMsg');
  if(!codigo||!nombre){msg.style.display='block';msg.style.color='var(--roj)';msg.textContent='Completa codigo y nombre.';return;}
  const btn=event.target;btn.disabled=true;btn.textContent='Creando...';
  const ci={};P.forEach(p=>{ci[p.rk]={potes:0,precio:p.com*(1-p.d)};});
  const stk={};P.forEach(p=>{stk[p.rk]=0;});
  const newMaq={name:nombre,code:codigo,tipo,ci,stock:stk,meses:[],compras:[],invTotal:0,ivaCredTotal:0,fechaAlta:new Date().toLocaleDateString('es-AR'),inactivos:{}};
  if(ONLINE_MODE){
    const res=await sbPost('maquinas',{codigo,nombre,tipo,usuario_id:usuarioId||null});
    if(res&&res[0])newMaq.supaId=res[0].id;
    else{msg.style.display='block';msg.style.color='var(--roj)';msg.textContent='Error — codigo ya existe.';btn.disabled=false;btn.textContent='Crear maquina';return;}
  }
  MAQ[codigo]=newMaq;savMAQ();renderSelectorMaquinas();
  msg.style.display='block';msg.style.color='var(--ver)';msg.textContent='Maquina '+nombre+' creada.';
  $('nmCodigo').value='';$('nmNombre').value='';
  btn.disabled=false;btn.textContent='Crear maquina';
}

</script>
